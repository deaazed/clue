name: clue_sl
description: "Clue Sensor Logger — records IMU, BLE, and session data for indoor localization."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.6.2

  # Sensors
  sensors_plus: ^6.1.1

  # BLE scanning
  flutter_blue_plus: ^1.35.3

  # Session storage
  path_provider: ^2.1.4

  # Backend upload
  http: ^1.2.0

  # Runtime permissions (location + BLE + notifications)
  permission_handler: ^11.3.1

  # Background recording — keeps app alive + persistent notification
  flutter_foreground_task: ^8.0.0

  # SVG rendering (logo in UI)
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo-clue.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: "assets/logo-clue.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
