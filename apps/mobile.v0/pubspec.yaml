name: clue_sl
description: "Clue Sensor Logger — records IMU, BLE, and session data for indoor localization."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.3.0

  # Sensors
  sensors_plus: ^7.1.0

  # BLE scanning
  flutter_blue_plus: ^2.3.10

  # Session storage
  path_provider: ^2.1.4

  # Backend upload
  http: ^1.2.0

  # Runtime permissions (location + BLE + notifications)
  permission_handler: ^12.0.3

  # Background recording — keeps app alive + persistent notification
  flutter_foreground_task: ^9.2.2

  # SVG rendering (logo in UI)
  flutter_svg: ^2.0.16

  # GPS location snapshot on memory save
  geolocator: ^14.0.3

  # Map display in memory detail
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Share memories via native share sheet
  share_plus: ^13.2.0
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.5.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon-clue.png"
  adaptive_icon_background: "design/icon-adaptive-bg.png"
  adaptive_icon_foreground: "design/icon-adaptive-fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
