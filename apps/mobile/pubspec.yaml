name: clue
description: "Crowdsourced indoor localization — sensor logger, trajectory replay, and item discovery."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo-clue.svg
    - assets/profile.jpg
