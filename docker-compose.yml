services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clue
      POSTGRES_USER: clue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clue -d clue"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://clue:${POSTGRES_PASSWORD}@postgres/clue?sslmode=disable
      PORT: ${PORT:-3000}
      TILES_DIR: /data/tiles
      # Pin Google sign-in tokens to Clue's own OAuth client (public ID, not a secret)
      GOOGLE_CLIENT_ID: 985498304664-rigdlljcn90rrtoc09jolig0rm1k6r5c.apps.googleusercontent.com
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - tiles_data:/data/tiles:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  tiles_data:
